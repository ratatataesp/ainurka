<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11 "Г" Аруларына арналған тосын сый</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Comfortaa:wght@400;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bright-pink: #ff0054;
            --soft-purple: #7209b7;
            --sky: #4cc9f0;
            --bg: #f8f9fa;
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Comfortaa', cursive;
            color: #333;
            overflow-x: hidden;
        }

        /* Анимациялы фон */
        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(120deg, #fff0f3 0%, #f0f4ff 100%);
        }

        header {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .class-label {
            font-family: 'Oswald', sans-serif;
            background: var(--bright-pink);
            color: white;
            padding: 5px 20px;
            border-radius: 50px;
            font-size: 1.2rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(255, 0, 84, 0.3);
        }

        .main-title {
            font-family: 'Caveat', cursive;
            font-size: clamp(3rem, 12vw, 6rem);
            color: var(--soft-purple);
            margin: 10px 0;
            line-height: 1;
        }

        h1 {
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            color: var(--bright-pink);
            font-weight: 700;
        }

        .intro-text {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 20px auto;
            color: #555;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            background: var(--bright-pink);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Comfortaa', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(255, 0, 84, 0.2);
        }

        .btn:hover {
            transform: scale(1.1) rotate(2deg);
            background: var(--soft-purple);
        }

        .btn-blue { background: var(--sky); box-shadow: 0 10px 20px rgba(76, 201, 240, 0.2); }

        /* Тілектер бөлімі */
        .wish-section {
            display: none;
            background: white;
            padding: 40px 20px;
            border-radius: 40px;
            margin: 40px auto;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #wishDisplay {
            font-size: 1.3rem;
            color: var(--soft-purple);
            font-weight: 600;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-tag {
            margin-top: 50px;
            font-family: 'Caveat', cursive;
            font-size: 2.2rem;
            color: var(--soft-purple);
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<header>
    <div class="class-label">11 "Г" СЫНЫБЫ</div>
    <div class="main-title">Қыздар, мерекелеріңмен!</div>
    <h1>8 Наурыз - Сұлулық пен Көктем мерекесі</h1>
    
    <p class="intro-text">
        Біздің сыныптың сәні мен мәні болған арулар! <br>
        Бүгін сендердің күндерің, жарқыраңдар! ✨
    </p>

    <div class="btn-group">
        <button class="btn" onclick="showGirlsWish()">Сыйлықты ашу 🎁</button>
        <button class="btn btn-blue" onclick="startParty()">Disco Party 💃</button>
    </div>

    <div class="footer-tag">Әрқашан ең үздік болып қалыңдар! ❤️</div>
</header>

<div id="girlsWishBox" class="wish-section">
    <div id="wishDisplay">Төмендегі батырманы бас...</div>
    <button class="btn" style="padding: 10px 25px; margin-top: 20px;" onclick="nextGirlWish()">Келесі тілек ✨</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
    const girlWishes = [
        "11 'Г' қыздары, ҰБТ-ны оңай тапсырып, қалаған гранттарыңа түсулеріңе тілектеспіз! 🎓",
        "Сыныптың еркелері, әрқашан осылай сүйкімді әрі көңілді болып жүре беріңдер! ✨",
        "Болашақта ең мықты маман иесі болып, биік белестерден көрініп жүріңдер! 🔥",
        "Қыздар, сендердің күлкілерің - біздің сыныптың ең үлкен байлығы! 😊",
        "Көктемгі гүлдей құлпырып, махаббат пен бақытқа бөленіңдер! 🌸",
        "Достығымыз мектеп бітірсе де үзілмесін, әрқашан бір-бірімізге қолдау болайық! ✊"
    ];

    function showGirlsWish() {
        const box = document.getElementById('girlsWishBox');
        box.style.display = 'block';
        box.scrollIntoView({ behavior: 'smooth' });
        triggerExplosion();
    }

    function nextGirlWish() {
        const wishEl = document.getElementById('wishDisplay');
        const randomWish = girlWishes[Math.floor(Math.random() * girlWishes.length)];
        
        wishEl.style.opacity = 0;
        setTimeout(() => {
            wishEl.innerText = randomWish;
            wishEl.style.opacity = 1;
        }, 200);

        confetti({
            particleCount: 50,
            spread: 80,
            origin: { y: 0.8 },
            colors: ['#ff0054', '#7209b7', '#4cc9f0']
        });
    }

    function triggerExplosion() {
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#ff0054', '#7209b7']
        });
    }

    function startParty() {
        var duration = 15 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);

            var particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
        
        alert("Disco режимі қосылды! 💃🔥");
    }
</script>

</body>
</html>
